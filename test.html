<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Note</title>
    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
</head>
<body>

    <div id="note-container">
        <label for="note">Enter your private note:</label>
        <textarea id="note" rows="4" cols="50"></textarea>
        <br>
        <button onclick="createPrivateNote()">Create Private Note</button>
    </div>

    <script>
        function createPrivateNote() {
            // Get the note content
            var noteContent = document.getElementById("note").value;

            // Send the note to a third-party service (example: jsFiddle echo API)
            $.ajax({
                type: "POST",
                url: "https://jsfiddle.net/api/post/library/pure/",
                data: {
                    html: noteContent
                },
                success: function(response) {
                    // Display the link to the private note
                    var link = window.location.href + response;
                    alert("Private Note Created!\nShare this link to view the note:\n" + link);

                    // Destroy the note (optional: clear the textarea)
                    document.getElementById("note").value = "";
                },
                error: function(error) {
                    alert("Error creating private note. Please try again.");
                }
            });
        }
    </script>

</body>
</html>
